version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oil_recycle_postgres
    environment:
      POSTGRES_USER: oil_admin
      POSTGRES_PASSWORD: oil_admin_2024
      POSTGRES_DB: oil_recycle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oil_admin -d oil_recycle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oil_recycle_backend
    environment:
      DATABASE_URL: postgresql://oil_admin:oil_admin_2024@postgres:5432/oil_recycle
      SECRET_KEY: oil_recycle_secret_key_2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oil_recycle_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api

volumes:
  postgres_data:
